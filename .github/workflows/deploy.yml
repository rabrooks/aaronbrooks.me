name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Required for OIDC token exchange with AWS.
permissions:
  id-token: write
  contents: read

# Don't cancel an in-flight deploy if a new push lands; queue it instead.
# Avoids partial state if a deploy is part-way through `aws s3 sync`.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # Two-pass sync: hashed assets get long cache, HTML gets must-revalidate
      # so content changes appear without waiting for a CloudFront invalidation
      # (the invalidation is still belt-and-braces).
      - name: Sync hashed assets to S3 (long cache)
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ \
            --delete \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML/XML/text to S3 (no cache)
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "*.txt" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
